name: publish-apt-repo

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Versione da pubblicare (es. 1.2.3 o v1.2.3). Obbligatoria per run manuale."
        required: false
        type: string

concurrency:
  group: publish-apt-repo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-apt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Resolve version from event/tag/dispatch input
        id: ver
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          RAW_TAG=""
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ -z "${INPUT_VERSION:-}" ]]; then
              echo "Errore: workflow_dispatch richiede input 'version'." >&2
              exit 1
            fi
            RAW_TAG="$INPUT_VERSION"
          elif [[ "$REF_TYPE" == "tag" && -n "${REF_NAME:-}" ]]; then
            RAW_TAG="$REF_NAME"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            RAW_TAG="$INPUT_VERSION"
          fi

          VERSION="${RAW_TAG#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Errore: impossibile risolvere la versione da release/tag/input." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=$VERSION"

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils rsync curl gzip
          python -m pip install --upgrade pip
          pip install pillow
          pip install -e .

      - name: Build Debian package
        shell: bash
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          ./packaging/build_deb.sh

      - name: Locate and validate .deb artifact
        id: deb
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          EXPECTED="dist/gdlex-pct-validator_${VERSION}_amd64.deb"
          DEB_PATH=""

          if [[ -f "$EXPECTED" ]]; then
            DEB_PATH="$EXPECTED"
          else
            MATCHES=(dist/gdlex-pct-validator_"${VERSION}"_*.deb)
            if [[ ${#MATCHES[@]} -eq 1 && -f "${MATCHES[0]}" ]]; then
              DEB_PATH="${MATCHES[0]}"
            fi
          fi

          if [[ -z "$DEB_PATH" ]]; then
            echo "Errore: pacchetto .deb non trovato per versione $VERSION in dist/." >&2
            ls -la dist >&2 || true
            exit 1
          fi

          dpkg-deb -I "$DEB_PATH" >/tmp/deb-info.txt
          dpkg-deb -c "$DEB_PATH" >/tmp/deb-contents.txt
          echo "deb_path=$DEB_PATH" >> "$GITHUB_OUTPUT"
          echo "Using DEB: $DEB_PATH"

      - name: Preflight guard for APT repo token
        shell: bash
        env:
          APT_TOKEN: ${{ secrets.GDLEX_APT_REPO_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$APT_TOKEN" || (echo "Missing secret GDLEX_APT_REPO_TOKEN" >&2; exit 1)

      - name: Checkout APT repository
        uses: actions/checkout@v4
        with:
          repository: cortomaltese88/gdlex-apt-repo
          token: ${{ secrets.GDLEX_APT_REPO_TOKEN }}
          path: gdlex-apt-repo

      - name: Publish package and regenerate APT indexes
        shell: bash
        env:
          DEB_PATH: ${{ steps.deb.outputs.deb_path }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          APT_REPO_DIR="gdlex-apt-repo"
          POOL_DIR="$APT_REPO_DIR/pool/main/g/gdlex-pct-validator"
          DIST_DIR="$APT_REPO_DIR/dists/stable/main/binary-amd64"
          RELEASE_FILE="$APT_REPO_DIR/dists/stable/Release"
          DEB_NAME="gdlex-pct-validator_${VERSION}_amd64.deb"
          APT_CONF="$PWD/$APT_REPO_DIR/apt-ftparchive.conf"

          mkdir -p "$POOL_DIR" "$DIST_DIR"
          cp -f "$DEB_PATH" "$POOL_DIR/"

          pushd "$APT_REPO_DIR" >/dev/null
          rm -f dists/stable/main/binary-amd64/Packages.gz
          apt-ftparchive packages pool > dists/stable/main/binary-amd64/Packages
          gzip -9n -c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz
          if [[ -f "$APT_CONF" ]]; then
            apt-ftparchive -c "$APT_CONF" release dists/stable > dists/stable/Release
          else
            apt-ftparchive release dists/stable > dists/stable/Release
          fi
          popd >/dev/null

          test -f "$POOL_DIR/$DEB_NAME"
          test -s "$DIST_DIR/Packages"
          test -s "$DIST_DIR/Packages.gz"
          test -s "$RELEASE_FILE"
          grep -q '^Origin: GDLEX$' "$RELEASE_FILE"
          grep -q '^Label: GDLEX$' "$RELEASE_FILE"
          grep -q '^Suite: stable$' "$RELEASE_FILE"
          grep -q '^Codename: stable$' "$RELEASE_FILE"

      - name: Sign APT Release metadata
        shell: bash
        env:
          GDLEX_APT_GPG_PRIVATE_KEY_B64: ${{ secrets.GDLEX_APT_GPG_PRIVATE_KEY_B64 }}
          GDLEX_APT_GPG_PASSPHRASE: ${{ secrets.GDLEX_APT_GPG_PASSPHRASE }}
          GDLEX_APT_GPG_KEY_ID: ${{ secrets.GDLEX_APT_GPG_KEY_ID }}
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y gnupg

          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"

          cleanup() {
            rm -rf "$GNUPGHOME"
          }
          trap cleanup EXIT

          test -n "${GDLEX_APT_GPG_PRIVATE_KEY_B64:-}" || { echo "Missing secret GDLEX_APT_GPG_PRIVATE_KEY_B64" >&2; exit 1; }
          test -n "${GDLEX_APT_GPG_PASSPHRASE:-}" || { echo "Missing secret GDLEX_APT_GPG_PASSPHRASE" >&2; exit 1; }
          test -n "${GDLEX_APT_GPG_KEY_ID:-}" || { echo "Missing secret GDLEX_APT_GPG_KEY_ID" >&2; exit 1; }

          printf '%s' "$GDLEX_APT_GPG_PRIVATE_KEY_B64" | base64 -d | gpg --batch --import

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GDLEX_APT_GPG_PASSPHRASE" \
            --local-user "$GDLEX_APT_GPG_KEY_ID" \
            --armor \
            --detach-sign \
            --output gdlex-apt-repo/dists/stable/Release.gpg \
            gdlex-apt-repo/dists/stable/Release

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GDLEX_APT_GPG_PASSPHRASE" \
            --local-user "$GDLEX_APT_GPG_KEY_ID" \
            --clearsign \
            --output gdlex-apt-repo/dists/stable/InRelease \
            gdlex-apt-repo/dists/stable/Release

          test -s gdlex-apt-repo/dists/stable/Release.gpg
          test -s gdlex-apt-repo/dists/stable/InRelease

          gpg --verify gdlex-apt-repo/dists/stable/Release.gpg gdlex-apt-repo/dists/stable/Release
          gpg --verify gdlex-apt-repo/dists/stable/InRelease

          grep -q '^-----BEGIN PGP SIGNED MESSAGE-----' gdlex-apt-repo/dists/stable/InRelease

      - name: Hard checks on generated indexes
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          DEB_FILE="gdlex-apt-repo/pool/main/g/gdlex-pct-validator/gdlex-pct-validator_${VERSION}_amd64.deb"
          PKG_FILE="gdlex-apt-repo/dists/stable/main/binary-amd64/Packages"
          PKG_GZ="gdlex-apt-repo/dists/stable/main/binary-amd64/Packages.gz"
          RELEASE_FILE="gdlex-apt-repo/dists/stable/Release"
          INRELEASE_FILE="gdlex-apt-repo/dists/stable/InRelease"
          RELEASE_SIG_FILE="gdlex-apt-repo/dists/stable/Release.gpg"
          EXPECTED_FILENAME="pool/main/g/gdlex-pct-validator/gdlex-pct-validator_${VERSION}_amd64.deb"

          test -f "$DEB_FILE"
          test -s "$PKG_FILE"
          test -s "$PKG_GZ"
          test -s "$RELEASE_FILE"
          test -s "$INRELEASE_FILE"
          test -s "$RELEASE_SIG_FILE"

          grep -q '^Package: gdlex-pct-validator$' "$PKG_FILE"
          grep -q "^Version: ${VERSION}$" "$PKG_FILE"
          grep -q "^Filename: ${EXPECTED_FILENAME}$" "$PKG_FILE"
          grep -q 'main/binary-amd64/Packages' "$RELEASE_FILE"
          grep -q 'main/binary-amd64/Packages.gz' "$RELEASE_FILE"
          grep -q '^-----BEGIN PGP SIGNED MESSAGE-----' "$INRELEASE_FILE"

          echo "Hard checks passed for version ${VERSION}."

      - name: Commit and push APT repository
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          pushd gdlex-apt-repo >/dev/null
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pool dists
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare nel repo APT."
            popd >/dev/null
            exit 0
          fi

          git commit -m "Publish gdlex-pct-validator ${VERSION} to APT repo"
          git push origin main
          popd >/dev/null

      - name: Remote visibility check (non-blocking with retry)
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          BASE_URL="https://cortomaltese88.github.io/gdlex-apt-repo"
          URLS=(
            "$BASE_URL/dists/stable/main/binary-amd64/Packages.gz"
            "$BASE_URL/dists/stable/Release"
            "$BASE_URL/dists/stable/InRelease"
            "$BASE_URL/dists/stable/Release.gpg"
            "$BASE_URL/pool/main/g/gdlex-pct-validator/gdlex-pct-validator_${VERSION}_amd64.deb"
          )
          ATTEMPTS=10
          SLEEP_SECONDS=15
          ok=0

          for i in $(seq 1 "$ATTEMPTS"); do
            all_ok=1
            for url in "${URLS[@]}"; do
              if ! curl -fsSI "$url" >/dev/null; then
                all_ok=0
                echo "URL non ancora raggiungibile: $url"
                break
              fi
            done

            if [[ "$all_ok" -eq 1 ]]; then
              echo "Asset APT remoti raggiungibili al tentativo $i/$ATTEMPTS"
              ok=1
              break
            fi
            echo "Tentativo $i/$ATTEMPTS fallito; nuovo tentativo tra ${SLEEP_SECONDS}s..."
            sleep "$SLEEP_SECONDS"
          done

          if [[ "$ok" -ne 1 ]]; then
            echo "::warning::Asset APT remoti non ancora tutti raggiungibili dopo ${ATTEMPTS} tentativi (possibile delay GitHub Pages)."
          fi

  apt-repo-sanity:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: apt repo sanity
        shell: bash
        run: |
          set -euo pipefail
          echo "apt repo sanity"

      - name: Preflight guard for APT repo token
        shell: bash
        env:
          APT_TOKEN: ${{ secrets.GDLEX_APT_REPO_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$APT_TOKEN" || (echo "Missing secret GDLEX_APT_REPO_TOKEN" >&2; exit 1)

      - name: Checkout APT repository
        uses: actions/checkout@v4
        with:
          repository: cortomaltese88/gdlex-apt-repo
          token: ${{ secrets.GDLEX_APT_REPO_TOKEN }}
          path: gdlex-apt-repo

      - name: Show first 30 lines of Packages
        shell: bash
        run: |
          set -euo pipefail
          PKG_FILE="gdlex-apt-repo/dists/stable/main/binary-amd64/Packages"
          if [[ ! -f "$PKG_FILE" ]]; then
            echo "Packages non trovato: $PKG_FILE" >&2
            exit 1
          fi
          sed -n '1,30p' "$PKG_FILE"
